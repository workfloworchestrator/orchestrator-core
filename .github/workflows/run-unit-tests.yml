name: Unit tests

# Pure unit tests: no Postgres, no Redis, no Docker. Reusable workflow only —
# this is invoked from ``run-integration-tests.yml`` as the first job (gate)
# so that PRs and pushes run the unit suite exactly once per Python version.
# It can also be triggered manually via the GitHub UI.

on:
  workflow_call:
  workflow_dispatch:

env:
  UV_LOCKED: true # Assert that the `uv.lock` will remain unchanged

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # It is considered best practice to pin to a specific uv version.
          version: "0.11.8"
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        # --all-extras: [project.optional-dependencies]
        # --dev: group 'dev' from [dependency-groups]
        run: uv sync --all-extras --dev

      - name: Assert no integration env vars leak into the unit suite
        # Hard contract: unit tests must run with no Postgres, no Redis, no
        # Docker. If anything sets DATABASE_URI / CACHE_URI in the environment
        # (e.g. a future workflow refactor), fail loud here rather than have
        # a unit test silently start touching a real service.
        run: |
          if [ -n "${DATABASE_URI:-}" ] || [ -n "${CACHE_URI:-}" ]; then
            echo "::error::DATABASE_URI / CACHE_URI must not be set for the unit-test job."
            exit 1
          fi

      - name: Run unit tests + doctests (no Postgres, no Redis)
        run: |
          unset DATABASE_URI CACHE_URI
          uv run pytest test/unit_tests orchestrator/core \
            --cov-branch --cov=orchestrator --cov-report=xml \
            --ignore=orchestrator/core/devtools \
            --ignore=examples --ignore=docs
        env:
          ENVIRONMENT: TESTING

      - name: "Upload coverage to Codecov"
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          files: ./coverage.xml
