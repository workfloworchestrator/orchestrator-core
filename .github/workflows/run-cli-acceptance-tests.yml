# CLI acceptance tests: full user-facing CLI code-generation flows.
# Reusable only — invoked from ``run-tests.yml`` after the unit-test gate
# passes. Celery and LLM acceptance suites have their own workflows.

name: Pytest CLI Acceptance Tests

on:
  workflow_call:
  workflow_dispatch:

env:
  UV_LOCKED: true # Assert that the `uv.lock` will remain unchanged

jobs:
  container_job:
    name: Pytest CLI Acceptance Tests Python (${{ matrix.python-version }}) Postgres (${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
        postgres-version: ["17"]
      fail-fast: false
    container: ubuntu:latest
    services:
      postgres:
        image: pgvector/pgvector:pg${{ matrix.postgres-version }}
        env:
          POSTGRES_PASSWORD: nwa
          POSTGRES_USER: nwa
          POSTGRES_DB: orchestrator-core-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.25"
          python-version: ${{ matrix.python-version }}

      - name: Install project and dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run pytest acceptance tests
        env:
          CACHE_URI: redis://redis
          DATABASE_URI: postgresql+psycopg://nwa:nwa@postgres/orchestrator-core-test
          ENVIRONMENT: TESTING
          PYTHONPATH: .
          REDIS_HOST: redis
        run: |
          uv run pytest test/acceptance_tests/cli -v -n auto \
            --cov-branch --cov=orchestrator --cov-report=xml

      - name: Install codecov dependencies
        run: apt-get update && apt-get install -y git curl gpg

      - name: "Upload coverage to Codecov"
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          files: ./coverage.xml
          flags: cli
