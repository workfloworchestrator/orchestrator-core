# workfloworchestrator.github.io uses site_name in the URL, don't change it
site_name: Orchestrator Core
site_description: An extensible workflow engine to manage customer facing resources and resource facing resources.
site_url: https://workfloworchestrator.org/orchestrator-core
theme:
  name: material
  icon:
    repo: fontawesome/brands/github-alt
  favicon: img/favicon.ico
  logo: img/WFO-Emblem-White.png
  palette:
    - scheme: default
      primary: teal
      accent: amber
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/lightbulb-on
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
    - primary: teal
      accent: amber
      media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.instant
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.tabs.link
    - header.autohide
plugins:
  - external-markdown
  - search
  - open-in-new-tab
  - render_swagger
  - macros
  - include-markdown
  - privacy
  - social
  - mkdocstrings:
      default_handler: python
      enable_inventory: true
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: null
            docstring_section_style: list
            annotations_path: full
            separate_signature: true
            line_length: 80
            show_signature_annotations: true
            unwrap_annotated: true
            docstring_options:
              trim_doctest_flags: true
  - redirects:
      redirect_maps:
        "architecture/product_modelling/imports.md": "guides/product-modeling/imports.md"
        "architecture/product_modelling/backfilling.md": "guides/product-modeling/backfilling.md"
        "architecture/application/tasks.md": "guides/tasks.md"
        "reference-docs/app/scaling.md": "guides/scaling.md"
        "reference-docs/app/pause-and-resume.md": "guides/pause-and-resume.md"
        "migration-guide/2.0.md": "guides/upgrading/2.0.md"
        "migration-guide/3.0.md": "guides/upgrading/3.0.md"
        "migration-guide/4.0.md": "guides/upgrading/4.0.md"
        "migration-guide/4.7.md": "guides/upgrading/4.7.md"
        "migration-guide/4.8.md": "guides/upgrading/4.8.md"
        "migration-guide/5.0.md": "guides/upgrading/5.0.md"
        "contributing/testing.md": "guides/testing.md"
copyright: Copyright &copy; 2018 - 2026 Workflow Orchestrator Programme
extra:
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/fQkQn5ajFR
      name: WFO on Discord!
repo_name: workfloworchestrator/orchestrator-core
repo_url: https://github.com/workfloworchestrator/orchestrator-core
edit_uri: edit/main/docs/
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.keys
  - pymdownx.inlinehilite
  - pymdownx.blocks.admonition
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - codehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - abbr

extra_css:
  - "css/termynal.css"
  - "css/custom.css"
  - "css/style.css"
  - "css/markers.css"
extra_javascript:
  - "js/termynal.js"
  - "js/custom.js"

