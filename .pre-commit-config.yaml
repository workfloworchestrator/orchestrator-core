default_language_version:
  python: python3
exclude: ^test/unit_tests/cli/data/generate/.*\.py|orchestrator/core/vendor.*
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --show-fixes]
        exclude: vulture_whitelist\.py

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: .bumpversion.cfg
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-docstring-first
      - id: check-json
      - id: check-yaml
        exclude: mkdocs.yml
      - id: debug-statements
      - id: requirements-txt-fixer
      - id: detect-private-key

  # This hook uses the `mypy` executable installed in your local environment
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: "uv run mypy"
        types: [python]
        require_serial: true
        verbose: true
        args:
          - --no-warn-unused-ignores
          - --allow-untyped-decorators
        exclude: (test/.*|migrations/.*|vulture_whitelist\.py)

  - repo: local
    hooks:
      - id: vulture
        name: vulture
        language: system
        entry: "uv run vulture orchestrator vulture_whitelist.py --min-confidence 90"
        types: [python]
        require_serial: true
        pass_filenames: false

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
        exclude: vulture_whitelist\.py
      - id: python-use-type-annotations
      - id: python-check-mock-methods

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
